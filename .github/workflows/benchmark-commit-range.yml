##################################################
## Commit-Range Performance Benchmark Workflow  ##
##################################################
#
# Triggered manually via workflow_dispatch.
# Checks out a target SQLFluff repository at a given branch, finds the
# merge-base with a configurable base branch, then iterates every commit
# from that merge-base to HEAD — installing sqlfluff and measuring parse
# and lint throughput at each one.  Results are written to the Job Summary.
#
name: Benchmark Commit Range

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository to benchmark (owner/repo)'
        required: true
        default: 'sqlfluff/sqlfluff'
      branch:
        description: 'Branch to iterate over (tip = HEAD)'
        required: true
        default: 'main'
      base_ref:
        description: 'Base branch used to find the merge-base (start of range)'
        required: false
        default: 'main'
      max_commits:
        description: 'Maximum number of commits to benchmark (oldest → newest order)'
        required: false
        default: '10'

jobs:
  benchmark:
    name: Benchmark ${{ inputs.repository }}@${{ inputs.branch }}
    runs-on: ubuntu-latest
    # Never cancel a running benchmark — partial results are still useful.
    timeout-minutes: 120

    steps:

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Target repo ─────────────────────────────────────────────────────────
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          # Full history is required to resolve the merge-base.
          fetch-depth: 0
          path: sqlfluff-target

      # ── Fixed SQL corpus ─────────────────────────────────────────────────────
      # Lives outside the checked-out repo so it stays identical at every commit.
      - name: Create fixed SQL benchmark corpus
        run: |
          mkdir -p benchmark-sql

          cat > benchmark-sql/01_simple_select.sql << 'SQL'
          SELECT
              id,
              first_name,
              last_name,
              email,
              created_at
          FROM users
          WHERE active = TRUE
            AND created_at >= '2023-01-01'
          ORDER BY last_name, first_name;
          SQL

          cat > benchmark-sql/02_multi_join.sql << 'SQL'
          SELECT
              o.order_id,
              o.created_at,
              c.name        AS customer_name,
              c.email       AS customer_email,
              p.name        AS product_name,
              oi.quantity,
              oi.unit_price,
              oi.quantity * oi.unit_price AS line_total
          FROM orders            AS o
          INNER JOIN customers   AS c  ON c.customer_id  = o.customer_id
          INNER JOIN order_items AS oi ON oi.order_id    = o.order_id
          INNER JOIN products    AS p  ON p.product_id   = oi.product_id
          WHERE o.status NOT IN ('cancelled', 'refunded')
          ORDER BY o.created_at DESC;
          SQL

          cat > benchmark-sql/03_complex_cte.sql << 'SQL'
          WITH
          monthly_revenue AS (
              SELECT
                  DATE_TRUNC('month', o.created_at) AS month,
                  SUM(oi.quantity * oi.unit_price)  AS revenue
              FROM orders      AS o
              JOIN order_items AS oi ON oi.order_id = o.order_id
              WHERE o.status = 'completed'
              GROUP BY 1
          ),
          monthly_growth AS (
              SELECT
                  month,
                  revenue,
                  LAG(revenue) OVER (ORDER BY month) AS prev_revenue,
                  revenue - LAG(revenue) OVER (ORDER BY month) AS delta,
                  ROUND(
                      100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))
                      / NULLIF(LAG(revenue) OVER (ORDER BY month), 0),
                      2
                  ) AS growth_pct
              FROM monthly_revenue
          ),
          ranked AS (
              SELECT
                  *,
                  RANK() OVER (ORDER BY revenue DESC) AS revenue_rank
              FROM monthly_growth
          )
          SELECT *
          FROM ranked
          WHERE revenue_rank <= 12
          ORDER BY month;
          SQL

          cat > benchmark-sql/04_subqueries.sql << 'SQL'
          SELECT
              dept.department_name,
              emp.full_name,
              emp.salary,
              dept_avg.avg_salary,
              emp.salary - dept_avg.avg_salary AS variance
          FROM employees AS emp
          JOIN departments AS dept
              ON dept.department_id = emp.department_id
          JOIN (
              SELECT
                  department_id,
                  AVG(salary) AS avg_salary
              FROM employees
              GROUP BY department_id
          ) AS dept_avg
              ON dept_avg.department_id = emp.department_id
          WHERE emp.salary > (
              SELECT AVG(salary) * 1.1 FROM employees
          )
          ORDER BY variance DESC;
          SQL

          cat > benchmark-sql/05_ddl.sql << 'SQL'
          CREATE TABLE IF NOT EXISTS events (
              event_id     BIGINT       NOT NULL,
              session_id   VARCHAR(64)  NOT NULL,
              user_id      BIGINT,
              event_type   VARCHAR(128) NOT NULL,
              properties   TEXT,
              occurred_at  TIMESTAMP    NOT NULL DEFAULT CURRENT_TIMESTAMP,
              processed_at TIMESTAMP,
              CONSTRAINT pk_events      PRIMARY KEY (event_id),
              CONSTRAINT fk_events_user FOREIGN KEY (user_id)
                  REFERENCES users (id) ON DELETE SET NULL
          );

          CREATE INDEX IF NOT EXISTS idx_events_session
              ON events (session_id, occurred_at DESC);

          CREATE INDEX IF NOT EXISTS idx_events_user_type
              ON events (user_id, event_type)
              WHERE user_id IS NOT NULL;
          SQL

          echo "Benchmark corpus ready:"
          ls -lh benchmark-sql/

      # ── Commit range ─────────────────────────────────────────────────────────
      - name: Resolve commit range
        id: range
        working-directory: sqlfluff-target
        env:
          BASE_REF: ${{ inputs.base_ref }}
          MAX_COMMITS: ${{ inputs.max_commits }}
        run: |
          # Fetch the base branch so merge-base resolution works.
          git fetch origin "$BASE_REF" --depth=200 2>/dev/null || true

          # Find where the target branch diverged from base.
          MERGE_BASE=$(
            git merge-base HEAD "origin/$BASE_REF" 2>/dev/null \
            || git rev-parse "HEAD~${MAX_COMMITS}" 2>/dev/null \
            || git rev-list HEAD | tail -1
          )
          echo "Merge-base: $MERGE_BASE"

          # Collect up to MAX_COMMITS commits, oldest→newest.
          git log --format="%H" "${MERGE_BASE}..HEAD" \
            | head -n "$MAX_COMMITS" \
            | tac \
            > /tmp/commits.txt

          TOTAL=$(wc -l < /tmp/commits.txt | tr -d ' ')
          echo "total=$TOTAL"          >> "$GITHUB_OUTPUT"
          echo "merge_base=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          echo "Commits to benchmark: $TOTAL"
          cat /tmp/commits.txt

      # ── Benchmark loop ───────────────────────────────────────────────────────
      - name: Run benchmarks across commits
        working-directory: sqlfluff-target
        env:
          CORPUS: ${{ github.workspace }}/benchmark-sql
        run: |
          RESULTS_FILE=/tmp/benchmark_results.csv
          echo "sha,short_sha,subject,install_ok,parse_time,lint_time" > "$RESULTS_FILE"

          while IFS= read -r SHA; do
            SHORT="${SHA:0:7}"
            SUBJECT=$(git log -1 --format="%s" "$SHA")
            echo "::group::[$SHORT] $SUBJECT"

            git checkout --quiet "$SHA"

            # Install sqlfluff at this commit; tolerate failure and continue.
            INSTALL_OK="true"
            if ! pip install --quiet -e ".[core]" 2>&1 | tail -5; then
              echo "::warning::pip install failed at $SHORT — skipping commit"
              INSTALL_OK="false"
            fi

            if [[ "$INSTALL_OK" == "false" ]]; then
              printf '%s,%s,%s,false,error,error\n' "$SHA" "$SHORT" "$SUBJECT" \
                >> "$RESULTS_FILE"
              echo "::endgroup::"
              continue
            fi

            # Measure wall-clock time for sqlfluff parse over the fixed corpus.
            PARSE_TIME=$(python3 -c "
          import subprocess, time
          start = time.perf_counter()
          subprocess.run(
              ['sqlfluff', 'parse', '--dialect', 'ansi', '--quiet', '${CORPUS}'],
              capture_output=True,
          )
          print(f'{time.perf_counter() - start:.3f}')
          " 2>/dev/null || echo "error")

            # Measure wall-clock time for sqlfluff lint over the fixed corpus.
            LINT_TIME=$(python3 -c "
          import subprocess, time
          start = time.perf_counter()
          subprocess.run(
              ['sqlfluff', 'lint', '--dialect', 'ansi', '--quiet', '${CORPUS}'],
              capture_output=True,
          )
          print(f'{time.perf_counter() - start:.3f}')
          " 2>/dev/null || echo "error")

            echo "Parse: ${PARSE_TIME}s  |  Lint: ${LINT_TIME}s"

            printf '%s,%s,%s,%s,%s,%s\n' \
              "$SHA" "$SHORT" "$SUBJECT" "$INSTALL_OK" "$PARSE_TIME" "$LINT_TIME" \
              >> "$RESULTS_FILE"

            echo "::endgroup::"
          done < /tmp/commits.txt

          echo "Benchmarks complete."
          cat "$RESULTS_FILE"

      # ── Job Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          REPOSITORY: ${{ inputs.repository }}
          BRANCH: ${{ inputs.branch }}
          BASE_REF: ${{ inputs.base_ref }}
          MERGE_BASE: ${{ steps.range.outputs.merge_base }}
          TOTAL: ${{ steps.range.outputs.total }}
        run: |
          python3 << 'PYEOF'
          import csv, os
          from pathlib import Path

          results_path  = Path("/tmp/benchmark_results.csv")
          summary_path  = Path(os.environ["GITHUB_STEP_SUMMARY"])

          repo       = os.environ.get("REPOSITORY", "?")
          branch     = os.environ.get("BRANCH", "?")
          base_ref   = os.environ.get("BASE_REF", "?")
          merge_base = (os.environ.get("MERGE_BASE") or "?")[:7]
          total      = os.environ.get("TOTAL", "?")

          rows = []
          if results_path.exists():
              with results_path.open() as f:
                  rows = list(csv.DictReader(f))

          lines = []
          lines.append("## Commit-Range Performance Benchmark\n")
          lines.append("| | |")
          lines.append("|---|---|")
          lines.append(f"| **Repository** | `{repo}` |")
          lines.append(f"| **Branch** | `{branch}` |")
          lines.append(f"| **Base ref** | `{base_ref}` |")
          lines.append(f"| **Merge-base** | `{merge_base}` |")
          lines.append(f"| **Commits benchmarked** | {len(rows)} / {total} |")
          lines.append("")

          if not rows:
              lines.append("> No benchmark results were collected.")
          else:
              lines.append("### Results per commit\n")
              lines.append("| Commit | Subject | Install | Parse (s) | Lint (s) |")
              lines.append("|--------|---------|:-------:|----------:|----------:|")
              for r in rows:
                  install_icon = "✅" if r.get("install_ok") == "true" else "❌"
                  parse = r.get("parse_time", "—")
                  lint  = r.get("lint_time", "—")
                  short = r.get("short_sha", "?")
                  subj  = (r.get("subject") or "")[:72]
                  lines.append(
                      f"| `{short}` | {subj} | {install_icon} | {parse} | {lint} |"
                  )

              # ── Delta: last vs. first successful commit ────────────────────
              ok_rows = [
                  r for r in rows
                  if r.get("install_ok") == "true"
                  and r.get("parse_time") not in ("error", "", None)
                  and r.get("lint_time")  not in ("error", "", None)
              ]

              if len(ok_rows) >= 2:
                  first, last = ok_rows[0], ok_rows[-1]
                  try:
                      parse_delta = float(last["parse_time"]) - float(first["parse_time"])
                      lint_delta  = float(last["lint_time"])  - float(first["lint_time"])

                      def fmt_delta(d: float) -> str:
                          sign  = "+" if d >= 0 else ""
                          arrow = "🔺" if d > 0.05 else ("🟢" if d < -0.05 else "➖")
                          return f"{arrow} `{sign}{d:.3f}s`"

                      lines.append("")
                      lines.append("### Delta: last commit vs. first commit\n")
                      lines.append(
                          f"| Metric | First (`{first['short_sha']}`) "
                          f"| Last (`{last['short_sha']}`) | Change |"
                      )
                      lines.append("|--------|------|------|--------|")
                      lines.append(
                          f"| Parse | {first['parse_time']}s "
                          f"| {last['parse_time']}s | {fmt_delta(parse_delta)} |"
                      )
                      lines.append(
                          f"| Lint  | {first['lint_time']}s "
                          f"| {last['lint_time']}s | {fmt_delta(lint_delta)} |"
                      )
                  except (ValueError, KeyError):
                      pass

              # ── Fastest / slowest parse ────────────────────────────────────
              try:
                  by_parse = sorted(ok_rows, key=lambda r: float(r["parse_time"]))
                  lines.append("")
                  lines.append("### Fastest / slowest parse\n")
                  lines.append(
                      f"- 🏆 **Fastest** parse: "
                      f"`{by_parse[0]['short_sha']}` — {by_parse[0]['parse_time']}s"
                  )
                  lines.append(
                      f"- 🐢 **Slowest** parse: "
                      f"`{by_parse[-1]['short_sha']}` — {by_parse[-1]['parse_time']}s"
                  )
              except (ValueError, IndexError):
                  pass

          summary_path.write_text("\n".join(lines) + "\n")
          print("Job summary written.")
          PYEOF

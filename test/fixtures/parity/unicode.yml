# Parity test cases - data for test/core/parser/parity/cases_test.py.
# See test/fixtures/parity/README.md for the schema and strictness contract.
#
# Unicode full-vs-simple case folding in RegexParser accept decisions.

postgres_eszett_function_name:
  sql: SELECT straße(1)
  dialect: postgres
  expect: tree
  pins: Python's RegexParser matches against raw.upper() - FULL unicode case mapping
    (strasse-with-eszett -> STRASSE, fi-ligature -> FI) - while the Rust regex crates
    only do simple case folding, under which the eszett never matches [A-Z]. Rust
    must pre-uppercase for case-insensitive patterns so RegexParser accept decisions
    agree. Before the fix this parsed as function under Python but column_reference
    under Rust.
duckdb_eszett_function_name:
  sql: SELECT straße(1)
  dialect: duckdb
  expect: tree
  pins: Python's RegexParser matches against raw.upper() - FULL unicode case mapping
    (strasse-with-eszett -> STRASSE, fi-ligature -> FI) - while the Rust regex crates
    only do simple case folding, under which the eszett never matches [A-Z]. Rust
    must pre-uppercase for case-insensitive patterns so RegexParser accept decisions
    agree. duckdb site of the eszett divergence.
postgres_create_function_unicode_name:
  sql: CREATE FUNCTION straße() RETURNS int AS 'x' LANGUAGE sql;
  dialect: postgres
  expect: tree
  pins: Python's RegexParser matches against raw.upper() - FULL unicode case mapping
    (strasse-with-eszett -> STRASSE, fi-ligature -> FI) - while the Rust regex crates
    only do simple case folding, under which the eszett never matches [A-Z]. Rust
    must pre-uppercase for case-insensitive patterns so RegexParser accept decisions
    agree. CREATE FUNCTION with a unicode name went unparsable on the Rust side only.
postgres_fi_ligature_function_name:
  sql: SELECT ﬁx(1)
  dialect: postgres
  expect: tree
  pins: Python's RegexParser matches against raw.upper() - FULL unicode case mapping
    (strasse-with-eszett -> STRASSE, fi-ligature -> FI) - while the Rust regex crates
    only do simple case folding, under which the eszett never matches [A-Z]. Rust
    must pre-uppercase for case-insensitive patterns so RegexParser accept decisions
    agree. The fi-ligature expands to two chars under full case mapping.
